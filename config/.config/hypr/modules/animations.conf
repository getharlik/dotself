
## Animation module
# (https://wiki.hypr.land/Configuring/Animations/)

animations {
    enabled = yes, please :)

    bezier = wind, 0.05, 0.85, 0.03, 0.97
    bezier = winIn, 0.1, 1, 0.1, 1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    bezier = md3_decel, 0.05, 0.80, 0.10, 0.97
    bezier = menu_decel, 0.05, 0.82, 0.43, 1
    bezier = menu_accel, 0.20, 0, 0.82, 0.10
    bezier = easeOutCirc, 0, 0.48, 0.38, 1
    

    animation = border, 1, 2, liner
    animation = borderangle, 1, 30, liner, loop

    animation = windowsIn, 1, 4, winIn, slide
    animation = windowsOut, 1, 4, winOut, slide
    animation = windowsMove, 1, 3.0, wind, slide

    animation = fade, 1, 4.0, md3_decel

    animation = layersIn, 1, 2.5, menu_decel, popin 80%
    animation = layersOut, 1, 2.0, menu_accel, popin 80%
    animation = fadeLayersIn, 1, 2.5, menu_decel
    animation = fadeLayersOut, 1, 2.0, menu_accel

    animation = workspaces, 1, 4.0, menu_decel, slide
    animation = specialWorkspace, 1, 2.3, md3_decel, slidefadevert 15%
}